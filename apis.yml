apis:
  - aid: eraser:eraser-api
    name: Eraser API
    description: >-
      The Eraser REST API provides programmatic access to diagram generation,
      file management, folder management, audit logs, and team usage metrics.
      Developers can generate diagrams from natural language prompts or Eraser
      DSL, create and manage files and diagrams on the canvas, and retrieve
      aggregated usage metrics. API access requires a team API token and is
      available on Starter, Business, and Enterprise paid plans with
      usage-based billing for API calls beyond plan credits.
