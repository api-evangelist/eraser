aid: eraser
name: Eraser
description: >-
  Eraser is an AI-powered diagramming and technical documentation platform
  designed for engineering teams. It provides a REST API for generating diagrams
  from natural language prompts or structured DSL, managing files and workspaces,
  and embedding interactive technical visuals into documentation workflows.
  The platform supports a wide range of diagram types including flow charts, ERDs,
  sequence diagrams, cloud architecture diagrams, and BPMN diagrams. Eraser
  integrates with tools such as GitHub, VS Code, Notion, and Confluence, and
  provides an MCP server for AI agent-driven diagram automation.
